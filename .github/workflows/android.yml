name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Compile and Build APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android SDK platform (API 36)
      run: |
        yes | sdkmanager --licenses > /dev/null 2>&1 || true
        sdkmanager "platforms;android-36" "build-tools;36.0.0" > /dev/null 2>&1 || \
        sdkmanager "platforms;android-35" "build-tools;35.0.0" > /dev/null 2>&1 || true

    - name: Prepare project for CI
      run: |
        GRADLE_VERSION="9.3.1"

        # 1. Crear archivos .env ANTES de cualquier invocación de Gradle
        #    El plugin Secrets los busca en la raíz del proyecto durante
        #    la fase de configuración, independientemente del módulo.
        ENV_CONTENT="GEMINI_API_KEY=dummy_ci_key
SUPABASE_URL=https://dummy.supabase.co
SUPABASE_KEY=dummy_ci_key"
        echo "$ENV_CONTENT" > .env.example
        echo "$ENV_CONTENT" > .env
        echo "$ENV_CONTENT" > app/.env.example
        echo "$ENV_CONTENT" > app/.env
        echo "Archivos .env creados en raiz y app/"

        # 2. Ajustar gradle.properties para CI
        sed -i 's/kotlin\.compiler\.execution\.strategy=in-process/kotlin.compiler.execution.strategy=daemon/g' gradle.properties
        echo "systemProp.java.awt.headless=true" >> gradle.properties
        sed -i 's/org\.gradle\.configuration-cache=true/org.gradle.configuration-cache=false/g' gradle.properties

        # 3. Eliminar local.properties y configuration cache previo
        rm -f local.properties app/local.properties
        rm -rf .gradle/configuration-cache

        # 4. Generar debug.keystore
        if [ ! -f debug.keystore ]; then
          keytool -genkeypair \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keypass android \
            -storepass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -deststoretype pkcs12
        fi
        if [ -f debug.keystore.base64 ]; then
          base64 -d debug.keystore.base64 > debug.keystore || \
          base64 --decode debug.keystore.base64 > debug.keystore
        fi

        # 5. Crear el Gradle Wrapper manualmente SIN invocar `gradle wrapper`
        #    (evita que Gradle configure :app antes de que existan los .env)
        mkdir -p gradle/wrapper
        cat > gradle/wrapper/gradle-wrapper.properties << EOF
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip
networkTimeout=10000
validateDistributionUrl=true
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
EOF

        # Descargar gradlew y gradlew.bat oficiales desde el repo de Gradle
        wget -q "https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VERSION}/gradlew" -O gradlew
        wget -q "https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VERSION}/gradlew.bat" -O gradlew.bat
        chmod +x gradlew

        # Descargar el gradle-wrapper.jar oficial
        wget -q "https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VERSION}/gradle/wrapper/gradle-wrapper.jar" \
          -O gradle/wrapper/gradle-wrapper.jar

        echo "Gradle wrapper creado:"
        ls -la gradlew gradle/wrapper/

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build Debug APK
      env:
        _JAVA_OPTIONS: "-Djava.awt.headless=true"
        ANDROID_HOME: ${{ env.ANDROID_HOME }}
      run: ./gradlew assembleDebug --stacktrace --no-daemon

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AitorShop-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error
