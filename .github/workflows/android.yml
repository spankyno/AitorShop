name: Build Android APK
 
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
 
jobs:
  build:
    name: Compile and Build APK
    runs-on: ubuntu-latest
 
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
 
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
 
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
 
    - name: Install Android SDK platform (API 36)
      run: |
        yes | sdkmanager --licenses > /dev/null 2>&1 || true
        sdkmanager "platforms;android-36" "build-tools;36.0.0" > /dev/null 2>&1 || \
        sdkmanager "platforms;android-35" "build-tools;35.0.0" > /dev/null 2>&1 || true
 
    - name: Generate Gradle Wrapper
      run: |
        # ── IMPORTANTE: los archivos .env deben existir ANTES de invocar Gradle,
        # porque `gradle wrapper` configura todos los proyectos (:app incluido)
        # y el plugin Secrets falla en esa fase si no los encuentra.
        ENV_CONTENT="GEMINI_API_KEY=dummy_ci_key
        SUPABASE_URL=https://dummy.supabase.co
        SUPABASE_KEY=dummy_ci_key"
        # Raíz del proyecto (donde el plugin busca en fase de configuración)
        echo "$ENV_CONTENT" > .env.example
        echo "$ENV_CONTENT" > .env
        # Directorio del módulo app/ (donde el plugin lee en fase de build)
        echo "$ENV_CONTENT" > app/.env.example
        echo "$ENV_CONTENT" > app/.env
        echo "✓ Archivos .env creados:"
        ls -la .env .env.example app/.env app/.env.example
 
        # Ajustes en gradle.properties para CI
        sed -i 's/kotlin\.compiler\.execution\.strategy=in-process/kotlin.compiler.execution.strategy=daemon/g' gradle.properties
        echo "systemProp.java.awt.headless=true" >> gradle.properties
        sed -i 's/org\.gradle\.configuration-cache=true/org.gradle.configuration-cache=false/g' gradle.properties
 
        # Eliminar local.properties con rutas SDK locales
        rm -f local.properties app/local.properties
 
        # Generar debug.keystore si no existe en el repo
        if [ ! -f debug.keystore ]; then
          keytool -genkeypair \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keypass android \
            -storepass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -deststoretype pkcs12
        fi
        if [ -f debug.keystore.base64 ]; then
          base64 -d debug.keystore.base64 > debug.keystore || \
          base64 --decode debug.keystore.base64 > debug.keystore
        fi
 
        # Ahora sí: descargar Gradle y generar el wrapper
        GRADLE_VERSION="8.11.1"
        wget -q "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -O /tmp/gradle.zip
        unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
        export GRADLE_HOME="/tmp/gradle-dist/gradle-${GRADLE_VERSION}"
        export PATH="${GRADLE_HOME}/bin:${PATH}"
        gradle wrapper --gradle-version="${GRADLE_VERSION}"
        chmod +x gradlew
 
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: wrapper
 
    - name: Build Debug APK
      env:
        _JAVA_OPTIONS: "-Djava.awt.headless=true"
        ANDROID_HOME: ${{ env.ANDROID_HOME }}
      run: ./gradlew assembleDebug --stacktrace --no-daemon
 
    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AitorShop-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error
