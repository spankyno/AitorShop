name: Build Android APK
 
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
 
jobs:
  build:
    name: Compile and Build APK
    runs-on: ubuntu-latest
 
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
 
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
 
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
 
    - name: Install Android SDK platform (API 36)
      run: |
        yes | sdkmanager --licenses > /dev/null 2>&1 || true
        sdkmanager "platforms;android-36" "build-tools;36.0.0" > /dev/null 2>&1 || \
        sdkmanager "platforms;android-35" "build-tools;35.0.0" > /dev/null 2>&1 || true
 
    - name: Generate Gradle Wrapper
      run: |
        GRADLE_VERSION="8.11.1"
        wget -q "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -O /tmp/gradle.zip
        unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
        export GRADLE_HOME="/tmp/gradle-dist/gradle-${GRADLE_VERSION}"
        export PATH="${GRADLE_HOME}/bin:${PATH}"
        gradle wrapper --gradle-version="${GRADLE_VERSION}"
        chmod +x gradlew
 
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: wrapper
 
    - name: Prepare environment files and properties
      run: |
        # El plugin Secrets de Google busca el defaultPropertiesFileName
        # en la raíz del proyecto durante la fase de configuración de Gradle,
        # independientemente del módulo donde esté declarado.
        # Creamos los archivos en la raíz Y en app/ para cubrir ambos casos.
        ENV_CONTENT=$(printf 'GEMINI_API_KEY=dummy_ci_key\nSUPABASE_URL=https://dummy.supabase.co\nSUPABASE_KEY=dummy_ci_key\n')
 
        echo "$ENV_CONTENT" > .env.example
        echo "$ENV_CONTENT" > .env
        echo "$ENV_CONTENT" > app/.env.example
        echo "$ENV_CONTENT" > app/.env
 
        # Verificar que se crearon correctamente
        echo "--- Archivos .env creados ---"
        ls -la .env .env.example app/.env app/.env.example
 
        # Cambiar estrategia del compilador Kotlin a daemon en CI
        sed -i 's/kotlin\.compiler\.execution\.strategy=in-process/kotlin.compiler.execution.strategy=daemon/g' gradle.properties
 
        # Forzar modo headless de AWT (evita NPE en KSP/Compose compiler)
        echo "systemProp.java.awt.headless=true" >> gradle.properties
 
        # Desactivar configuration cache en CI
        sed -i 's/org\.gradle\.configuration-cache=true/org.gradle.configuration-cache=false/g' gradle.properties
 
        # Eliminar local.properties con rutas SDK locales
        rm -f local.properties app/local.properties
 
        # Generar debug.keystore si no existe en el repo
        if [ ! -f debug.keystore ]; then
          keytool -genkeypair \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keypass android \
            -storepass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -deststoretype pkcs12
        fi
 
        # Decodificar keystore desde base64 si existe
        if [ -f debug.keystore.base64 ]; then
          base64 -d debug.keystore.base64 > debug.keystore || \
          base64 --decode debug.keystore.base64 > debug.keystore
        fi
 
    - name: Build Debug APK
      env:
        _JAVA_OPTIONS: "-Djava.awt.headless=true"
        ANDROID_HOME: ${{ env.ANDROID_HOME }}
      run: ./gradlew assembleDebug --stacktrace --no-daemon
 
    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AitorShop-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error
